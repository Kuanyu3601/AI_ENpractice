<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/navbar.css">
    <link rel="stylesheet" href="/static/css/sign_in.css">

    <script src="/static/js/sign_in.js" defer></script>
    <script src="../static/js/navbar.js" defer></script>
    <title>page.sign_in</title>
</head>
<body>

<div class="bg-circle bc1"></div>
<div class="bg-circle bc2"></div>

<div id="navbar-container"></div>

<main>
    <div class="group">
        <div class="card">
            <div class="tab-wrapper">
                <div class="arrow-slot" id="arrowSlot">
                    <img class="arrow-img" id="arrowIndicator" src="/static/image/arrow.png" alt="arrow">
                </div>

                <div class="tabs">
                    <button class="tab-btn active" id="tabRegister" onclick="switchTab('register')">註冊</button>
                    <button class="tab-btn" id="tabLogin" onclick="switchTab('login')">登入</button>
                </div>
            </div>

            <div id="formRegister">
                <form action="/register" method="POST">
                    <div class="form-group" style="animation-delay:0.05s">
                        <label>姓名</label>
                        <input type="text" name="name" placeholder="請輸入您的姓名" required>
                    </div>
                    <div class="form-group" style="animation-delay:0.1s">
                        <label>帳號</label>
                        <input type="text" name="username" placeholder="請設定帳號" required>
                    </div>
                    <div class="form-group" style="animation-delay:0.15s">
                        <label>密碼</label>
                        <input type="password" name="password" placeholder="請設定密碼（至少 8 位）" required>
                    </div>
                    <button type="submit" class="submit-btn">確認註冊</button>
                </form>
                <p class="footer-hint">已有帳號？<a href="#" onclick="switchTab('login');return false;">立即登入</a></p>
            </div>

            <div id="formLogin" style="display:none;">
                <form action="/login" method="POST">
                    <div class="form-group" style="animation-delay:0.05s">
                        <label>帳號</label>
                        <input type="text" name="username" placeholder="請輸入帳號" required>
                    </div>
                    <div class="form-group" style="animation-delay:0.1s">
                        <label>密碼</label>
                        <input type="password" name="password" placeholder="請輸入密碼" required>
                    </div>
                    <button type="submit" class="submit-btn">確認登入</button>
                </form>
                <p class="footer-hint">尚無帳號？<a href="#" onclick="switchTab('register');return false;">立即註冊</a></p>
            </div>
        </div>

        <div class="fox-gif">
            <img src="/static/gif/fox.webp" alt="動畫" style="width: 100%; height: auto;">
        </div>
    </div>
</main>

</body>
</html>
